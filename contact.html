<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | João André</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff512f;
            --secondary: #dd2476;
            --accent: #ff9a9e;
            --bg-dark: #090e1a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Animação de Fundo (Mesmo padrão da Home) */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.15;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30vw, -20vh) scale(1.2); }
            66% { transform: translate(-10vw, 50vh) scale(0.8); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* Card de Contato */
        .contact-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 50px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: cardAppear 0.8s ease-out;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .contact-card h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .contact-card p.subtitle {
            text-align: center;
            color: var(--text-dim);
            margin-bottom: 40px;
            font-size: 1rem;
        }

        /* Formulário */
        form {
            display: grid;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent);
            margin-left: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, textarea {
            padding: 15px 20px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            background: var(--input-bg);
            color: #fff;
            font-size: 1rem;
            transition: var(--transition);
            outline: none;
        }

        input:focus, textarea:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(255, 154, 158, 0.2);
        }

        textarea {
            resize: none;
            min-height: 140px;
        }

        button {
            margin-top: 10px;
            padding: 18px;
            border-radius: 18px;
            border: none;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(221, 36, 118, 0.2);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(221, 36, 118, 0.4);
            filter: brightness(1.1);
        }

        /* Redes Sociais */
        .social-links {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .social-links a {
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.85rem;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 50px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            transition: var(--transition);
        }

        .social-links a:hover {
            background: var(--text-main);
            color: var(--bg-dark);
            transform: translateY(-3px);
        }

        .back-home {
            margin-top: 40px;
            text-align: center;
        }

        .back-home a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-home a:hover {
            color: var(--accent);
        }

        /* Responsividade */
        @media (max-width: 480px) {
            .contact-card { padding: 30px 20px; }
            .contact-card h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="bubble" style="width: 500px; height: 500px; top: -200px; right: -100px;"></div>
        <div class="bubble" style="width: 300px; height: 300px; bottom: -50px; left: -50px; animation-duration: 25s;"></div>
    </div>

    <div class="contact-card">
        <h1>Vamos Conversar?</h1>
        <p class="subtitle">Interessado em colaborar ou apenas quer dar um oi? Preencha o formulário abaixo.</p>

        <form id="contactForm">
            <div class="input-group">
                <label for="name">Nome Completo</label>
                <input type="text" id="name" placeholder="Como posso te chamar?" required>
            </div>

            <div class="input-group">
                <label for="email">E-mail Profissional</label>
                <input type="email" id="email" placeholder="exemplo@dominio.com" required>
            </div>

            <div class="input-group">
                <label for="message">Sua Mensagem</label>
                <textarea id="message" placeholder="Conte-me sobre seu projeto ou ideia..." required></textarea>
            </div>

            <button type="submit" id="submitBtn">Enviar Mensagem</button>
        </form>

        <div class="social-links">
            <a href="https://www.linkedin.com/in/jo%C3%A3o-cardoso-b63293276/" target="_blank">LinkedIn</a>
            <a href="https://www.instagram.com/joaoandredinizcardoso/" target="_blank">Instagram</a>
            <a href="mailto:seuemail@email.com">E-mail</a>
            <a href="https://github.com/Dededsons" target="_blank">GitHub</a>
        </div>

        <div class="back-home">
            <a href="index.html">
                <span>←</span> Voltar para o Início
            </a>
        </div>
    </div>

    <script>
        // Pequena lógica para feedback visual ao enviar
        const form = document.getElementById('contactForm');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            btn.innerText = 'Enviando...';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            // Simula um tempo de envio
            setTimeout(() => {
                alert('Mensagem enviada com sucesso! (Simulação)');
                form.reset();
                btn.innerText = 'Enviar Mensagem';
                btn.style.opacity = '1';
                btn.disabled = false;
            }, 1500);
        });
    </script>

</body>
</html>
